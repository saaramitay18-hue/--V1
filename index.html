    let markers = {};
    for (let city in places) {
      markers[city] = L.marker(places[city], {
        icon: L.divIcon({
          html: '<div style="background:#3388ff;color:white;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:14px;">•</div>',
          iconSize: [24, 24],
          className: ''
        })
      }).addTo(map).bindPopup(city);
    }

    let previousAlerts = [];
    let secondsLeft = 5;
    let timerInterval;

    const statusText = document.getElementById('status-text');
    const timerText = document.getElementById('timer');

    function updateTimer() {
      timerText.textContent = `רענון בעוד ${secondsLeft} שניות`;
      secondsLeft--;
      if (secondsLeft < 0) secondsLeft = 5;
    }

    async function fetchAlerts() {
      const alertsDiv = document.getElementById('alerts');
      const audio = document.getElementById('sirenSound');

      secondsLeft = 5;

      try {
        let res = await fetch('https://www.kore.co.il/redAlert.json', { cache: 'no-cache' });
        let data = await res.json();

        alertsDiv.innerHTML = '';

        let currentAlerts = [];

        // איפוס כל המרקרים לגודל רגיל כחול
        for (let city in markers) {
          markers[city].setIcon(L.divIcon({
            html: '<div style="background:#3388ff;color:white;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:14px;">•</div>',
            iconSize: [24, 24],
            className: ''
          }));
        }

        if (data && data.data && data.data.length > 0) {
          statusText.className = 'has-alert';
          statusText.textContent = 'יש אזעקות פעילות';

          const alertList = document.createElement('div');
          alertList.className = 'alert-list';

          data.data.forEach(city => {
            const p = document.createElement('p');
            p.className = 'alert';
            p.textContent = city;
            alertList.appendChild(p);

            if (markers[city]) {
              // שינוי לנקודה אדומה גדולה יותר כשיש אזעקה
              markers[city].setIcon(L.divIcon({
                html: '<div style="background:#ff4444;color:white;width:32px;height:32px;border-radius:50%;text-align:center;line-height:32px;font-size:18px;font-weight:bold;">!</div>',
                iconSize: [32, 32],
                className: ''
              }));
            }
            currentAlerts.push(city);
          });

          alertsDiv.appendChild(alertList);

          if (JSON.stringify(currentAlerts.sort()) !== JSON.stringify(previousAlerts.sort())) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("לא ניגן סאונד:", e));
          }

          previousAlerts = currentAlerts;
        } else {
          statusText.className = 'no-alert';
          statusText.textContent = 'אין אזעקות פעילות ✓';
          audio.pause();
          audio.currentTime = 0;
          previousAlerts = [];
        }
      } catch (e) {
        statusText.className = 'no-alert';
        statusText.textContent = 'שגיאה זמנית - נסה רענן';
        console.error(e);
      }
    }

    timerInterval = setInterval(updateTimer, 1000);

    fetchAlerts();
    setInterval(fetchAlerts, 5000);  // רענון כל 5 שניות
  </script>
